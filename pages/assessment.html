<!--=============================================================================
    INITIALIZE
=============================================================================-->

<script>

'use strict';

document.addEventListener(

    'DOMContentLoaded',

    function(){

        /*----------------------------------------------------------
            RESTORE VISITOR
        ----------------------------------------------------------*/

        const state =

            CTM.storage.getState();

        if(

            state &&

            state.visitor &&

            state.visitor.name

        ){

            document.getElementById(

                'visitorName'

            ).textContent =

                state.visitor.name.toUpperCase();

        }

        /*----------------------------------------------------------
            START ASSESSMENT ENGINE
        ----------------------------------------------------------*/

        CTM.assessmentEngine.init();

    }

);
