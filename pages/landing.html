<!--=============================================================================
    LANDING PAGE
=============================================================================-->

<script>

'use strict';

/*=============================================================================
    CTM LANDING
=============================================================================*/

(function(){

    /*=========================================================================
        ELEMENTS
    =========================================================================*/

    const welcomeScreen =

        document.getElementById(

            'welcomeScreen'

        );

    const registrationScreen =

        document.getElementById(

            'registrationScreen'

        );

    const btnBeginJourney =

        document.getElementById(

            'btnBeginJourney'

        );

    const registrationForm =

        document.getElementById(

            'registrationForm'

        );

    /*=========================================================================
        INITIAL STATE
    =========================================================================*/

    registrationScreen.style.display =

        'none';

    /*=========================================================================
        SHOW REGISTRATION
    =========================================================================*/

    btnBeginJourney.addEventListener(

        'click',

        function(){

            welcomeScreen.style.display =

                'none';

            registrationScreen.style.display =

                'flex';

            window.scrollTo({

                top:0,

                behavior:'smooth'

            });

        }

    );

    /*=========================================================================
        SUBMIT
    =========================================================================*/

    registrationForm.addEventListener(

        'submit',

        function(event){

            event.preventDefault();

            const visitor = {

                name:

                    document.getElementById(

                        'visitorName'

                    ).value.trim(),

                email:

                    document.getElementById(

                        'visitorEmail'

                    ).value.trim(),

                mobile:

                    document.getElementById(

                        'visitorMobile'

                    ).value.trim(),

                district:

                    document.getElementById(

                        'visitorDistrict'

                    ).value.trim(),

                state:

                    document.getElementById(

                        'visitorState'

                    ).value.trim()

            };

            CTM.storage.updateVisitor(

                visitor

            );

            CTM.storage.setCurrentPillar(

                0

            );

            window.location.href =

                'assessment.html';

        }

    );

})();

</script>
