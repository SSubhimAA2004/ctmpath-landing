<script>

'use strict';

/*=============================================================================

    LANDING PAGE

=============================================================================*/

(function(){

    /*=========================================================================

        ELEMENTS

    =========================================================================*/

    const welcomeSection =

        document.getElementById(

            'welcome'

        );



    const registrationSection =

        document.getElementById(

            'registration'

        );



    const btnBeginJourney =

        document.getElementById(

            'btnBeginJourney'

        );



    const registrationForm =

        document.getElementById(

            'registrationForm'

        );



    /*=========================================================================

        INITIAL STATE

    =========================================================================*/

    registrationSection.hidden = true;



    /*=========================================================================

        BEGIN JOURNEY

    =========================================================================*/

    btnBeginJourney.addEventListener(

        'click',

        function(){

            welcomeSection.hidden = true;

            registrationSection.hidden = false;

            window.scrollTo({

                top:0,

                behavior:'smooth'

            });

        }

    );



    /*=========================================================================

        REGISTRATION

    =========================================================================*/

    registrationForm.addEventListener(

        'submit',

        function(event){

            event.preventDefault();



            const visitor = {

                name:

                    document

                    .getElementById(

                        'visitorName'

                    )

                    .value

                    .trim(),



                email:

                    document

                    .getElementById(

                        'visitorEmail'

                    )

                    .value

                    .trim(),



                mobile:

                    document

                    .getElementById(

                        'visitorMobile'

                    )

                    .value

                    .trim(),



                district:

                    document

                    .getElementById(

                        'visitorDistrict'

                    )

                    .value

                    .trim(),



                state:

                    document

                    .getElementById(

                        'visitorState'

                    )

                    .value

                    .trim()

            };



            /*--------------------------------------------------------------

                SIMPLE VALIDATION

            --------------------------------------------------------------*/

            if(

                visitor.name === '' ||

                visitor.email === '' ||

                visitor.mobile === '' ||

                visitor.district === '' ||

                visitor.state === ''

            ){

                alert(

                    'Please complete all the required fields.'

                );

                return;

            }



            /*--------------------------------------------------------------

                SAVE VISITOR

            --------------------------------------------------------------*/

            CTM.storage.updateVisitor(

                visitor

            );



            CTM.storage.setCurrentPillar(

                0

            );



            /*--------------------------------------------------------------

                NAVIGATE

            --------------------------------------------------------------*/

            CTM.router.go(

                'assessment'

            );



        }

    );



})();

</script>
