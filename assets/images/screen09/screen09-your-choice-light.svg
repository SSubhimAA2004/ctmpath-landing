
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="640"
    height="640"
    viewBox="0 0 640 640">

    <defs>

        <!--================================================
        Premium Glow
        ================================================-->

        <filter
            id="goldGlow"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%">

            <feGaussianBlur
                stdDeviation="7"
                result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>



        <!--================================================
        Gold Gradient
        ================================================-->

        <linearGradient
            id="gold"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop
                offset="0%"
                stop-color="#F7E5AE"/>

            <stop
                offset="100%"
                stop-color="#D6B56C"/>

        </linearGradient>



        <!--================================================
        CTM Teal
        ================================================-->

        <linearGradient
            id="teal"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop
                offset="0%"
                stop-color="#20D5C7"/>

            <stop
                offset="100%"
                stop-color="#56F0E3"/>

        </linearGradient>

    </defs>



    <!--================================================
    Central Circle
    ================================================-->

    <circle

        cx="320"

        cy="320"

        r="105"

        fill="none"

        stroke="url(#gold)"

        stroke-width="5"

        filter="url(#goldGlow)"/>



    <circle

        cx="320"

        cy="320"

        r="82"

        fill="none"

        stroke="#20D5C7"

        stroke-width="2"

        opacity=".30"/>



    <!--================================================
    Heart
    ================================================-->

    <text

        x="320"

        y="340"

        text-anchor="middle"

        font-size="72"

        fill="url(#gold)"

        filter="url(#goldGlow)">

        ❤️

    </text>



    <!--================================================
    Dream Icons
    ================================================-->

    <text
        x="320"
        y="82"
        text-anchor="middle"
        font-size="40"
        fill="#20D5C7">
        🏡
    </text>

    <text
        x="520"
        y="170"
        text-anchor="middle"
        font-size="36"
        fill="#20D5C7">
        👨‍👩‍👧
    </text>

    <text
        x="560"
        y="320"
        text-anchor="middle"
        font-size="36"
        fill="#20D5C7">
        ✈️
    </text>

    <text
        x="520"
        y="470"
        text-anchor="middle"
        font-size="36"
        fill="#20D5C7">
        🌍
    </text>

    <text
        x="320"
        y="560"
        text-anchor="middle"
        font-size="38"
        fill="#20D5C7">
        😊
    </text>

    <text
        x="120"
        y="470"
        text-anchor="middle"
        font-size="36"
        fill="#20D5C7">
        🎓
    </text>

    <text
        x="80"
        y="320"
        text-anchor="middle"
        font-size="36"
        fill="#20D5C7">
        🤝
    </text>

    <text
        x="120"
        y="170"
        text-anchor="middle"
        font-size="36"
        fill="#20D5C7">
        ❤️
    </text>



    <!--================================================
    Money Symbol
    Small
    Moving Away
    ================================================-->

    <text

        x="500"

        y="95"

        text-anchor="middle"

        font-size="30"

        fill="#D6B56C"

        opacity=".25">

        💰

    </text>



    <!--================================================
    Connection Lines
    ================================================-->

    <g

        stroke="#20D5C7"

        stroke-width="1"

        opacity=".16"

        fill="none">

        <line x1="320" y1="120" x2="320" y2="220"/>

        <line x1="470" y1="190" x2="385" y2="255"/>

        <line x1="505" y1="320" x2="400" y2="320"/>

        <line x1="470" y1="450" x2="385" y2="385"/>

        <line x1="320" y1="520" x2="320" y2="420"/>

        <line x1="170" y1="450" x2="255" y2="385"/>

        <line x1="135" y1="320" x2="240" y2="320"/>

        <line x1="170" y1="190" x2="255" y2="255"/>

    </g>



    <!--================================================
    Premium Stars
    ================================================-->

    <circle
        cx="205"
        cy="115"
        r="3"
        fill="#D6B56C"
        opacity=".70"/>

    <circle
        cx="445"
        cy="135"
        r="2.8"
        fill="#20D5C7"
        opacity=".60"/>

    <circle
        cx="470"
        cy="520"
        r="3"
        fill="#D6B56C"
        opacity=".65"/>

    <circle
        cx="185"
        cy="505"
        r="2.5"
        fill="#20D5C7"
        opacity=".55"/>

</svg>