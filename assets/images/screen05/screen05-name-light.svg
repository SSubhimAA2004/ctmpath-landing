
<svg
    width="320"
    height="320"
    viewBox="0 0 320 320"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
>


<!--==================================================
Definitions
==================================================-->

<defs>


    <radialGradient
        id="tealGlow"
        cx="50%"
        cy="50%"
        r="50%">

        <stop
            offset="0%"
            stop-color="#16B889"
            stop-opacity="0.35"/>

        <stop
            offset="70%"
            stop-color="#16B889"
            stop-opacity="0.08"/>

        <stop
            offset="100%"
            stop-color="#16B889"
            stop-opacity="0"/>

    </radialGradient>



    <linearGradient
        id="goldLine"
        x1="0"
        y1="0"
        x2="1"
        y2="1">


        <stop
            offset="0%"
            stop-color="#D6B56C"/>


        <stop
            offset="100%"
            stop-color="#A57B35"/>


    </linearGradient>



    <linearGradient
        id="ivoryLine"
        x1="0"
        y1="0"
        x2="0"
        y2="1">


        <stop
            offset="0%"
            stop-color="#FFF9EA"/>


        <stop
            offset="100%"
            stop-color="#E9E2D3"/>


    </linearGradient>



    <filter
        id="softGlow"
        x="-50%"
        y="-50%"
        width="200%"
        height="200%">


        <feGaussianBlur
            stdDeviation="14"/>


    </filter>


</defs>



<!--==================================================
Ambient Identity Glow
==================================================-->

<circle
    cx="160"
    cy="160"
    r="120"
    fill="url(#tealGlow)"
/>


<circle
    cx="160"
    cy="150"
    r="65"
    fill="#16B889"
    opacity="0.12"
    filter="url(#softGlow)"
/>



<!--==================================================
Personal Name Card Symbol
==================================================-->

<rect
    x="85"
    y="105"
    width="150"
    height="110"
    rx="18"
    stroke="url(#goldLine)"
    stroke-width="3"
/>



<!-- Inner identity line -->

<path
    d="
    M110 145
    H210
    "
    stroke="#F6F1E7"
    stroke-opacity="0.7"
    stroke-width="3"
    stroke-linecap="round"
/>



<path
    d="
    M110 170
    H180
    "
    stroke="#F6F1E7"
    stroke-opacity="0.45"
    stroke-width="2"
    stroke-linecap="round"
/>



<!--==================================================
Signature Light
==================================================-->

<path
    d="
    M112 190
    C128 178 142 202 158 188
    C174 174 190 200 210 184
    "
    stroke="url(#goldLine)"
    stroke-width="3"
    stroke-linecap="round"
/>



<!--==================================================
Recognition Spark
==================================================-->

<circle
    cx="160"
    cy="82"
    r="10"
    fill="#D6B56C"
/>



<path
    d="
    M160 60
    V48

    M160 104
    V116

    M138 82
    H126

    M194 82
    H182
    "
    stroke="#D6B56C"
    stroke-width="2"
    stroke-linecap="round"
/>



<!--==================================================
Base Reflection
==================================================-->

<path
    d="
    M90 235
    H230
    "
    stroke="#F6F1E7"
    stroke-opacity="0.4"
    stroke-width="2"
    stroke-linecap="round"
/>



<circle
    cx="160"
    cy="250"
    r="4"
    fill="#D6B56C"
/>



</svg>