
<?xml version="1.0" encoding="UTF-8"?>

<svg
width="420"
height="420"
viewBox="0 0 420 420"
xmlns="http://www.w3.org/2000/svg">


<defs>


<!-- GOLD LIGHT GRADIENT -->

<radialGradient
id="giftGlow"
cx="50%"
cy="50%"
r="50%">

<stop
offset="0%"
stop-color="#FFFFFF"/>

<stop
offset="25%"
stop-color="#F5D98A"/>

<stop
offset="60%"
stop-color="#D9B56A"/>

<stop
offset="100%"
stop-color="#D9B56A"
stop-opacity="0"/>

</radialGradient>



<!-- PREMIUM GOLD -->

<linearGradient
id="goldStroke"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop
offset="0%"
stop-color="#FFF0A3"/>

<stop
offset="45%"
stop-color="#D9B56A"/>

<stop
offset="100%"
stop-color="#B47718"/>

</linearGradient>



<!-- SOFT GLOW -->

<filter id="blur">

<feGaussianBlur
stdDeviation="18"/>

</filter>


</defs>




<!-- =========================
SCREEN 02 GIFT LIGHT
========================= -->


<g id="gift-light">



<!-- Ambient Light -->

<circle

cx="210"

cy="210"

r="120"

fill="url(#giftGlow)"

opacity="0.35"

filter="url(#blur)"/>




<!-- Inner Discovery Circle -->

<circle

cx="210"

cy="210"

r="72"

fill="none"

stroke="url(#goldStroke)"

stroke-width="3"

opacity="0.75"/>





<!-- Rising Light -->

<path

d="
M210 275
C210 235 210 195 210 140
"

fill="none"

stroke="url(#goldStroke)"

stroke-width="8"

stroke-linecap="round"/>





<!-- Light Opening -->

<path

d="
M165 180
L210 125
L255 180
"

fill="none"

stroke="url(#goldStroke)"

stroke-width="6"

stroke-linecap="round"

stroke-linejoin="round"/>






<!-- Centre Gift Moment -->

<circle

cx="210"

cy="210"

r="16"

fill="#D9B56A"/>



<circle

cx="210"

cy="210"

r="6"

fill="#FFFFFF"/>





<!-- Four Minimal Rays -->

<path

d="
M210 95
V70

M210 325
V350

M95 210
H70

M325 210
H350
"

stroke="#D9B56A"

stroke-width="4"

stroke-linecap="round"

opacity="0.8"/>



</g>



</svg>
