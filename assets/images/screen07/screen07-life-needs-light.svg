
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="520"
    height="520"
    viewBox="0 0 520 520"
    fill="none">

    <defs>

        <linearGradient
            id="tealGlow"
            x1="0"
            y1="0"
            x2="1"
            y2="1">

            <stop
                offset="0%"
                stop-color="#2DD4BF"/>

            <stop
                offset="100%"
                stop-color="#8BE8D8"/>

        </linearGradient>

        <linearGradient
            id="goldAccent"
            x1="0"
            y1="0"
            x2="1"
            y2="1">

            <stop
                offset="0%"
                stop-color="#D6B56C"/>

            <stop
                offset="100%"
                stop-color="#F4E1A6"/>

        </linearGradient>

        <filter
            id="softGlow">

            <feGaussianBlur
                stdDeviation="6"
                result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>

    </defs>

    <!-- Ambient Glow -->

    <circle
        cx="260"
        cy="260"
        r="170"
        fill="url(#tealGlow)"
        opacity="0.08"/>

    <!-- Clipboard -->

    <rect
        x="145"
        y="90"
        width="230"
        height="320"
        rx="18"
        stroke="#F5F0E6"
        stroke-width="3"/>

    <!-- Clip -->

    <rect
        x="215"
        y="68"
        width="90"
        height="36"
        rx="10"
        stroke="url(#goldAccent)"
        stroke-width="3"/>

    <!-- Ranking Cards -->

    <g filter="url(#softGlow)">

        <!-- Card 1 -->

        <rect
            x="175"
            y="135"
            width="170"
            height="34"
            rx="8"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <circle
            cx="192"
            cy="152"
            r="8"
            fill="url(#goldAccent)"/>

        <line
            x1="210"
            y1="152"
            x2="318"
            y2="152"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <!-- Card 2 -->

        <rect
            x="175"
            y="182"
            width="170"
            height="34"
            rx="8"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <circle
            cx="192"
            cy="199"
            r="8"
            fill="url(#goldAccent)"/>

        <line
            x1="210"
            y1="199"
            x2="318"
            y2="199"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <!-- Card 3 -->

        <rect
            x="165"
            y="232"
            width="190"
            height="42"
            rx="10"
            stroke="url(#tealGlow)"
            stroke-width="3"/>

        <circle
            cx="185"
            cy="253"
            r="9"
            fill="url(#goldAccent)"/>

        <line
            x1="205"
            y1="253"
            x2="330"
            y2="253"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <!-- Up Arrow -->

        <path
            d="M375 244 L392 227 L409 244"
            stroke="url(#goldAccent)"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"/>

        <!-- Down Arrow -->

        <path
            d="M375 262 L392 279 L409 262"
            stroke="url(#goldAccent)"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"/>

        <!-- Card 4 -->

        <rect
            x="175"
            y="292"
            width="170"
            height="34"
            rx="8"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <circle
            cx="192"
            cy="309"
            r="8"
            fill="url(#goldAccent)"/>

        <line
            x1="210"
            y1="309"
            x2="318"
            y2="309"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <!-- Card 5 -->

        <rect
            x="175"
            y="339"
            width="170"
            height="34"
            rx="8"
            stroke="#F5F0E6"
            stroke-width="2"/>

        <circle
            cx="192"
            cy="356"
            r="8"
            fill="url(#goldAccent)"/>

        <line
            x1="210"
            y1="356"
            x2="318"
            y2="356"
            stroke="#F5F0E6"
            stroke-width="2"/>

    </g>

    <!-- Spark -->

    <circle
        cx="405"
        cy="105"
        r="5"
        fill="url(#goldAccent)"
        opacity="0.9"/>

    <circle
        cx="120"
        cy="165"
        r="4"
        fill="url(#tealGlow)"
        opacity="0.7"/>

    <circle
        cx="390"
        cy="395"
        r="4"
        fill="url(#tealGlow)"
        opacity="0.7"/>

</svg>