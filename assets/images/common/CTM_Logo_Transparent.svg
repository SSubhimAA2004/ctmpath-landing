<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" fill="none"
xmlns="http://www.w3.org/2000/svg">

<!-- CTM PATH™ Transparent Logo -->

<defs>
    <linearGradient id="tealGold" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#18A66D"/>
        <stop offset="55%" stop-color="#18A66D"/>
        <stop offset="100%" stop-color="#D9B56A"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#FFF0B0"/>
        <stop offset="50%" stop-color="#D9B56A"/>
        <stop offset="100%" stop-color="#B8862F"/>
    </linearGradient>

    <filter id="glow">
        <feGaussianBlur stdDeviation="8"/>
    </filter>
</defs>


<!-- Star -->
<circle cx="400" cy="150" r="38" fill="#D9B56A" opacity=".18" filter="url(#glow)"/>
<path d="M400 95 L410 140 L455 150 L410 160 L400 205 L390 160 L345 150 L390 140 Z"
fill="url(#gold)"/>


<!-- Human figure -->
<circle cx="230" cy="210" r="24" fill="#18A66D"/>
<path d="M230 245
C205 285 205 340 220 390
L245 390
C250 335 275 290 300 260
C270 270 245 270 230 245Z"
fill="#18A66D"/>


<!-- Path -->
<path d="M160 420
C300 390 410 360 520 300
C600 255 640 310 610 370
C570 450 420 470 160 500"
stroke="url(#tealGold)"
stroke-width="35"
stroke-linecap="round"/>


<!-- CTM PATH Text -->
<text x="400" y="610"
text-anchor="middle"
font-family="Georgia, serif"
font-size="120"
font-weight="700"
fill="url(#tealGold)">
CTM PATH™
</text>


<!-- Guided Journey -->
<text x="400" y="680"
text-anchor="middle"
font-family="Arial, sans-serif"
font-size="38"
letter-spacing="12"
fill="#18A66D">
GUIDED JOURNEY™
</text>


<!-- Tagline -->
<text x="400" y="750"
text-anchor="middle"
font-family="Georgia, serif"
font-size="32"
fill="#F5E7C0">
Every Dream Has a Path™
</text>


</svg>
