
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="640"
    height="640"
    viewBox="0 0 640 640">

    <defs>

        <!--==============================
        Glow
        ==============================-->

        <filter
            id="glow"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%">

            <feGaussianBlur
                stdDeviation="8"
                result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>

        <!--==============================
        Teal Gradient
        ==============================-->

        <linearGradient
            id="tealGradient"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop
                offset="0%"
                stop-color="#20D5C7"/>

            <stop
                offset="100%"
                stop-color="#59F0E4"/>

        </linearGradient>

        <!--==============================
        Gold Gradient
        ==============================-->

        <linearGradient
            id="goldGradient"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop
                offset="0%"
                stop-color="#F6E2A8"/>

            <stop
                offset="100%"
                stop-color="#D6B56C"/>

        </linearGradient>

    </defs>



    <!--==================================
    Central Circle
    ===================================-->

    <circle

        cx="320"

        cy="320"

        r="92"

        fill="none"

        stroke="url(#goldGradient)"

        stroke-width="5"

        filter="url(#glow)"

        opacity="0.95"/>



    <circle

        cx="320"

        cy="320"

        r="70"

        fill="none"

        stroke="#20D5C7"

        stroke-width="2"

        opacity=".35"/>



    <!--==================================
    Dream Star
    ===================================-->

    <polygon

        points="
        320,250
        334,298
        384,298
        344,328
        360,378
        320,348
        280,378
        296,328
        256,298
        306,298"

        fill="url(#goldGradient)"

        filter="url(#glow)"/>



    <!--==================================
    Dream Icons Around Circle
    ===================================-->

    <!-- Home -->

    <text

        x="320"

        y="92"

        text-anchor="middle"

        font-size="42"

        fill="#20D5C7">

        🏡

    </text>



    <!-- Family -->

    <text

        x="500"

        y="150"

        text-anchor="middle"

        font-size="38"

        fill="#20D5C7">

        👨‍👩‍👧

    </text>



    <!-- Education -->

    <text

        x="565"

        y="320"

        text-anchor="middle"

        font-size="38"

        fill="#20D5C7">

        🎓

    </text>



    <!-- Travel -->

    <text

        x="500"

        y="500"

        text-anchor="middle"

        font-size="38"

        fill="#20D5C7">

        ✈️

    </text>



    <!-- Health -->

    <text

        x="320"

        y="565"

        text-anchor="middle"

        font-size="40"

        fill="#20D5C7">

        ❤️

    </text>



    <!-- Peace -->

    <text

        x="140"

        y="500"

        text-anchor="middle"

        font-size="38"

        fill="#20D5C7">

        😊

    </text>



    <!-- Financial Freedom -->

    <text

        x="75"

        y="320"

        text-anchor="middle"

        font-size="38"

        fill="#20D5C7">

        💰

    </text>



    <!-- Business -->

    <text

        x="140"

        y="150"

        text-anchor="middle"

        font-size="38"

        fill="#20D5C7">

        🚀

    </text>



    <!-- Time -->

    <text

        x="210"

        y="110"

        text-anchor="middle"

        font-size="28"

        fill="#D6B56C">

        ⏰

    </text>



    <!-- Passion -->

    <text

        x="430"

        y="110"

        text-anchor="middle"

        font-size="28"

        fill="#D6B56C">

        🎨

    </text>



    <!-- Help -->

    <text

        x="430"

        y="540"

        text-anchor="middle"

        font-size="28"

        fill="#D6B56C">

        🤝

    </text>



    <!-- Freedom -->

    <text

        x="210"

        y="540"

        text-anchor="middle"

        font-size="28"

        fill="#D6B56C">

        🌍

    </text>



    <!--==================================
    Connection Lines
    ===================================-->

    <g

        stroke="#20D5C7"

        stroke-width="1"

        opacity=".18"

        fill="none">

        <line x1="320" y1="130" x2="320" y2="230"/>

        <line x1="470" y1="180" x2="380" y2="250"/>

        <line x1="525" y1="320" x2="410" y2="320"/>

        <line x1="470" y1="460" x2="380" y2="390"/>

        <line x1="320" y1="510" x2="320" y2="410"/>

        <line x1="170" y1="460" x2="260" y2="390"/>

        <line x1="115" y1="320" x2="230" y2="320"/>

        <line x1="170" y1="180" x2="260" y2="250"/>

    </g>

</svg>