<?xml version="1.0" encoding="UTF-8"?>

<svg
width="900"
height="1100"
viewBox="0 0 900 1100"
xmlns="http://www.w3.org/2000/svg">


<defs>



<!-- GOLD MASTER GRADIENT -->

<linearGradient

id="goldGradient"

x1="0%"

y1="0%"

x2="100%"

y2="100%">


<stop

offset="0%"

stop-color="#FFF0A3"/>



<stop

offset="30%"

stop-color="#D9B56A"/>



<stop

offset="65%"

stop-color="#B47718"/>



<stop

offset="100%"

stop-color="#FFE49A"/>


</linearGradient>





<!-- TEXT GLOW -->


<filter

id="textGlow">


<feGaussianBlur

stdDeviation="5"/>


</filter>





<!-- LIGHT GLOW -->


<filter

id="lightGlow">


<feGaussianBlur

stdDeviation="20"/>


</filter>



</defs>







<!-- ===================================
BACKGROUND

TRANSPARENT

=================================== -->


<g id="background">

</g>








<!-- ===================================
UPPER AND LOWER MASTER ARCHES

NOT PERFECT CIRCLE

=================================== -->


<g id="mastery-arches">



<!-- Upper Arch -->


<path

d="
M125 325
C190 80 710 80 775 325
"

fill="none"

stroke="url(#goldGradient)"

stroke-width="58"

stroke-linecap="round"/>





<!-- Lower Arch -->


<path

d="
M125 535
C220 780 680 780 775 535
"

fill="none"

stroke="url(#goldGradient)"

stroke-width="58"

stroke-linecap="round"/>


</g>








<!-- ===================================
INFINITY TRANSFORMATION SYMBOL
=================================== -->


<g id="infinity-symbol">


<path

d="

M215 420

C215 285 355 285 450 420

C545 555 685 555 685 420

C685 285 545 285 450 420

C355 555 215 555 215 420

"

fill="none"

stroke="url(#goldGradient)"

stroke-width="70"

stroke-linecap="round"

stroke-linejoin="round"/>


</g>








<!-- ===================================
TRANSFORMATION LIGHT
=================================== -->


<g id="transformation-light">


<circle

cx="450"

cy="420"

r="75"

fill="#D9B56A"

opacity=".25"

filter="url(#lightGlow)"/>



<circle

cx="450"

cy="420"

r="28"

fill="#D9B56A"/>



<circle

cx="450"

cy="420"

r="10"

fill="#FFFFFF"/>


</g>








<!-- ===================================
WORDMARK

SOLID IVORY WHITE

=================================== -->


<g id="wordmark">


<!-- subtle glow -->


<text

x="450"

y="850"

text-anchor="middle"

font-family="Georgia, Times New Roman, serif"

font-size="120"

font-weight="700"

letter-spacing="14"

fill="#FFFFFF"

opacity=".18"

filter="url(#textGlow)">

CTM PATH

</text>





<!-- Main brand name -->


<text

x="450"

y="850"

text-anchor="middle"

font-family="Georgia, Times New Roman, serif"

font-size="120"

font-weight="700"

letter-spacing="14"

fill="#F5F4EE">

CTM PATH

</text>


</g>








<!-- ===================================
SUB TITLE
=================================== -->


<g id="guided-journey">


<text

x="450"

y="930"

text-anchor="middle"

font-family="Arial, Helvetica, sans-serif"

font-size="34"

font-weight="400"

letter-spacing="22"

fill="#00C2B8">

GUIDED JOURNEY

</text>


</g>








<!-- ===================================
TAGLINE
=================================== -->


<g id="tagline">


<text

x="450"

y="1020"

text-anchor="middle"

font-family="Georgia, Times New Roman, serif"

font-size="42"

font-style="italic"

fill="#D9B56A">

Every Dream Has A Path

</text>


</g>





</svg>