<section
    id="screen05"
    class="screen">

    <div class="container">

        <div class="hero fade-up">

            <!--==================================================
            Hero Illustration
            ==================================================-->

            <div class="hero-icon">

                <img
                    class="hero-logo"
                    src="assets/images/screen05/screen05-name-light.svg"
                    alt="Your Name"
                    loading="lazy"
                    decoding="async"
                    draggable="false">

            </div>



            <!--==================================================
            Hero Message
            ==================================================-->

            <section
                class="welcome-block"
                aria-labelledby="screen05-title">

                <h1
                    id="screen05-title"
                    class="tamil tamil-welcome">

                    உங்கள் பெயர்

                </h1>

                <div
                    class="english english-welcome">

                    YOUR NAME

                </div>

            </section>



            <!--==================================================
            Premium Divider
            ==================================================-->

            <div
                class="gold-divider"
                aria-hidden="true">

            </div>



            <!--==================================================
            Screen Message
            ==================================================-->

            <section
                class="introduction-block">

                <div
                    class="tamil tamil-intro">

                    நான் உங்களை...

                    <br><br>

                    <span class="text-gold">

                        எப்படி

                    </span>

                    <br>

                    அழைக்கலாம்?

                </div>



                <div
                    class="english">

                    What

                    <br><br>

                    should I

                    <br>

                    call you?

                </div>

            </section>



            <!--==================================================
            Premium Divider
            ==================================================-->

            <div
                class="gold-divider small"
                aria-hidden="true">

            </div>



            <!--==================================================
            Name Input
            ==================================================-->

            <section
                class="input-block">

                <label
                    for="visitor-name"
                    class="input-label english">

                    Your Name

                </label>

                <input
                    id="visitor-name"
                    class="visitor-name-input"
                    type="text"
                    placeholder="Enter your name"
                    autocomplete="name"
                    maxlength="60">

            </section>



            <!--==================================================
            Journey Navigator
            ==================================================-->

            <section
                class="cta-block">

                <button
                    id="screen05Continue"
                    class="journey-next"
                    type="button"
                    data-next-screen="screen06"
                    aria-label="Continue Journey">

                    <span class="nav-decoration"></span>

                    <span
                        class="nav-tamil tamil">

                        தொடரலாம்

                    </span>

                    <span
                        class="nav-arrows">

                        → → →

                    </span>

                    <span
                        class="nav-english english">

                        CONTINUE JOURNEY

                    </span>

                    <span class="nav-decoration"></span>

                </button>

            </section>

        </div>

    </div>

</section>
