<section
    class="screen"
    id="screen05">

    <div class="container">

        <div class="hero">

            <!-- Screen Caption -->

            <div class="screen-caption">

                MOMENT 05 OF 36

            </div>

            <!-- Divider -->

            <div class="gold-divider"></div>

            <!-- Tamil -->

            <h1 class="tamil">

                <span class="text-gold">

                    உங்கள் பெயர்

                </span>

                <br><br>

                நான் உங்களை...

                <br><br>

                எப்படி

                <br>

                அழைக்கலாம்?

            </h1>

            <!-- Divider -->

            <div class="gold-divider small"></div>

            <!-- English -->

            <div class="english">

                <span class="english-welcome">

                    Your Name

                </span>

                <br><br>

                What

                <br>

                should I

                <br>

                call you?

            </div>

            <!-- Divider -->

            <div class="gold-divider"></div>

            <!-- Name Input -->

            <div class="field">

                <div class="input-group">

                    <input

                        type="text"

                        id="firstName"

                        name="firstName"

                        class="input input-field"

                        placeholder="உங்கள் பெயர் • Your First Name"

                        autocomplete="given-name"

                        spellcheck="false"

                        maxlength="40"

                        aria-label="Your First Name"

                        required>

                </div>

                <div class="field-help">

                    உங்கள் முதல் பெயரை மட்டும் உள்ளிடுங்கள்.

                    <br>

                    Please enter your first name only.

                </div>

            </div>

            <!-- Continue -->

            <button

                id="btnContinue"

                class="btn btn-primary"

                data-action="continue"

                data-next="screen06">

                <span class="btn-title">

                    தொடரலாம் →

                </span>

                <span class="btn-subtitle">

                    Continue

                </span>

            </button>

        </div>

    </div>

</section>
