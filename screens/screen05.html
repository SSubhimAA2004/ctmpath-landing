<section

    id="screen05"

    class="journey-screen screen05">



    <!--==================================================
    Journey Indicator
    ==================================================-->


    <div

        class="screen-progress">


        <span

            class="moment-label">

            MOMENT 05 OF 36

        </span>


    </div>





    <!--==================================================
    Main Content
    ==================================================-->


    <div

        class="screen-content">





        <!-- Illustration -->


        <div

            class="screen-visual">


            <img

                src="assets/images/screen05/screen05-name-light.svg"

                alt="Your name"

                class="screen-image">


        </div>





        <!-- Tamil Title -->


        <h1

            class="screen-title tamil">


            உங்கள் பெயர்


        </h1>





        <!-- Tamil Message -->


        <div

            class="screen-message tamil">


            <p>

                நான் உங்களை...

            </p>


            <p>

                எப்படி

            </p>


            <p>

                அழைக்கலாம்?

            </p>


        </div>





        <!-- English Subtitle -->


        <div

            class="screen-subtitle english">


            <p>

                What

            </p>


            <p>

                should I

            </p>


            <p>

                call you?

            </p>


        </div>







        <!--==================================================
        Name Input
        ==================================================-->


        <div

            class="name-input-wrapper">


            <label

                for="visitor-name"

                class="input-label">


                Your Name


            </label>



            <input

                id="visitor-name"

                type="text"

                class="visitor-name-input"

                placeholder="Enter your name"

                autocomplete="name">



        </div>








        <!--==================================================
        Navigation Cue
        ==================================================-->


        <button

            class="journey-next"

            data-next-screen="screen06"

            aria-label="Continue Journey">


            <span

                class="tamil">

                தொடரலாம்


            </span>



            <span

                class="english">

                Continue


            </span>



            <span

                class="arrow">

                ↓


            </span>



        </button>





    </div>



</section>
