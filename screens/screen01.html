
<!--
======================================================================

CTM PATH™ Guided Journey v6.1

File
screens/screen01.html

Purpose
Welcome the visitor.

Responsibility
• Create an exceptional first impression
• Display CTM PATH™ identity
• Build trust
• Introduce Raphael Raj
• Invite the visitor to begin the journey

======================================================================
-->

<section
    id="screen01"
    class="screen">

    <div class="container">

        <div class="hero fade-up">

            <!--==================================================
            CTM PATH Logo
            ==================================================-->

            <div class="hero-icon">

                <img
                    class="hero-logo"
                    src="assets/images/common/CTM_Logo_Transparent.svg"
                    alt="CTM PATH Logo"
                    loading="eager"
                    decoding="async"
                    draggable="false">

            </div>



            <!--==================================================
            Welcome
            ==================================================-->

            <section
                class="welcome-block"
                aria-labelledby="welcome-title">

                <h1
                    id="welcome-title"
                    class="tamil tamil-welcome">

                    வாங்க! வாங்க!!

                </h1>

                <div
                    class="english english-welcome">

                    Welcome! Welcome!!

                </div>

            </section>



            <!--==================================================
            Divider
            ==================================================-->

            <div
                class="gold-divider"
                aria-hidden="true">

            </div>



            <!--==================================================
            Introduction
            ==================================================-->

            <section
                class="introduction-block">

                <div
                    class="tamil tamil-intro">

                    நான்

                    <br><br>

                    <span class="hero-name">

                        ரஃபேல் ராஜ்.

                    </span>

                    <br><br>

                    உங்களை

                    <br>

                    <span class="text-gold">

                        சந்தித்ததில்

                    </span>

                    <br>

                    மகிழ்ச்சி.

                </div>



                <div
                    class="english">

                    I'm

                    <span class="hero-name">

                        Raphael Raj.

                    </span>

                    <br><br>

                    It is truly a pleasure

                    <br>

                    to welcome you.

                </div>

            </section>



            <!--==================================================
            Divider
            ==================================================-->

            <div
                class="gold-divider small"
                aria-hidden="true">

            </div>



            <!--==================================================
            Journey Navigator
            ==================================================-->

            <section
                class="cta-block">

                <button
                    id="btnContinue"
                    class="journey-next"
                    type="button"
                    data-next-screen="screen02"
                    aria-label="Begin Your Journey">

                    <span class="nav-decoration"></span>

                    <span class="nav-tamil tamil">

                        தொடங்கலாம்

                    </span>

                    <span class="nav-arrows">

                        → → →

                    </span>

                    <span class="nav-english english">

                        BEGIN YOUR JOURNEY

                    </span>

                    <span class="nav-decoration"></span>

                </button>

            </section>

        </div>

    </div>

</section>
