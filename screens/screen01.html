<section
    id="screen01"
    class="screen">

    <div class="container">

        <!--==================================================
        Logo
        ==================================================-->

        <header class="hero-header">

            <img
                src="../assets/CTMLogo.png"
                alt="CTM PATH Logo"
                class="logo">

        </header>


        <!--==================================================
        Hero
        ==================================================-->

        <div class="hero">

            <div class="gold-divider"></div>


            <!-- Tamil -->

            <h1
                class="tamil"
                data-personalize>

                <span class="text-gold">

                    வணக்கம்.

                </span>

                <br><br>

                நான்

                <br>

                <span class="hero-name">

                    ரஃபேல் ராஜ்.

                </span>

                <br><br>

                உங்களைச்

                <br>

                <span class="text-gold">

                    சந்தித்ததில்

                </span>

                <br>

                மகிழ்ச்சி.

            </h1>


            <div class="gold-divider small"></div>


            <!-- English -->

            <div
                class="english"
                data-personalize>

                Hello.

                <br><br>

                I'm

                <span class="highlight">

                    Raphael Raj.

                </span>

                <br><br>

                It's a pleasure

                <br>

                to meet you.

            </div>


            <!-- Begin Button -->

            <button

                id="btnContinue"

                class="btn btn-primary"

                data-action="continue"

                data-next="screen02">

                <span class="btn-title">

                    தொடங்கலாம்

                    →

                </span>

                <span class="btn-subtitle">

                    Let's Begin

                </span>

            </button>

        </div>

    </div>

</section>
