
<!--
======================================================================

    CTM PATH™
    FROM SURVIVAL TO LIVING™

    Screen 01
    Emotion

    Purpose

    • Create emotional connection
    • Ask one profound question
    • Capture visitor's current perception
    • Continue to Registration

======================================================================
-->

<section
    id="screen01"
    class="screen screen01 fade-in">

    <div class="screen01-container">

        <!--==================================================
            Brand
        ==================================================-->

        <header class="screen01-header">

            <h1 class="brand">

                CTM PATH™

            </h1>

            <p class="tagline">

                FROM SURVIVAL TO LIVING™

            </p>

        </header>

        <!--==================================================
            Assessment Intro
        ==================================================-->

        <section class="screen01-intro">

            <p class="intro-tamil">

                வாழ்க்கை மதிப்பீடு • 7 நிமிடங்கள்

            </p>

            <p class="intro-english">

                Life Assessment • 7 Minutes

            </p>

        </section>

        <!--==================================================
            Hero Question
        ==================================================-->

        <section class="screen01-hero">

            <h2 class="hero-tamil">

                நீங்கள்...

                <br><br>

                பிழைக்கிறீர்களா?

                <br><br>

                அல்லது

                <br><br>

                வாழ்கிறீர்களா?

            </h2>

            <h3 class="hero-english">

                Are You...

                <br>

                Surviving?

                <br><br>

                or

                <br><br>

                Living?

            </h3>

        </section>

        <!--==================================================
            Selection Prompt
        ==================================================-->

        <section class="screen01-prompt">

            <p class="body-tamil">

                எது உங்களை சிறப்பாக விவரிக்கிறது?

            </p>

            <p class="body-english">

                Which statement best describes your life today?

            </p>

        </section>

        <!--==================================================
            Options
        ==================================================-->

        <section
            id="emotionOptions"
            class="emotion-options">

            <button
                class="emotion-card"
                data-value="surviving">

                <span class="emotion-indicator"></span>

                <div class="emotion-text">

                    <div class="emotion-tamil">

                        நான் பிழைத்துக் கொண்டிருக்கிறேன்.

                    </div>

                    <div class="emotion-english">

                        I am Surviving.

                    </div>

                </div>

            </button>

            <button
                class="emotion-card"
                data-value="progress">

                <span class="emotion-indicator"></span>

                <div class="emotion-text">

                    <div class="emotion-tamil">

                        நான் முன்னேறிக் கொண்டிருக்கிறேன்.

                    </div>

                    <div class="emotion-english">

                        I am Making Progress.

                    </div>

                </div>

            </button>

            <button
                class="emotion-card"
                data-value="living">

                <span class="emotion-indicator"></span>

                <div class="emotion-text">

                    <div class="emotion-tamil">

                        நான் நன்றாக வாழ்கிறேன்.

                    </div>

                    <div class="emotion-english">

                        I am Living Well.

                    </div>

                </div>

            </button>

            <button
                class="emotion-card"
                data-value="unsure">

                <span class="emotion-indicator"></span>

                <div class="emotion-text">

                    <div class="emotion-tamil">

                        எனக்குத் தெரியவில்லை.

                    </div>

                    <div class="emotion-english">

                        I'm Not Sure.

                    </div>

                </div>

            </button>

        </section>

        <!--==================================================
            Continue
        ==================================================-->

        <section class="screen01-actions">

            <button
                id="btnContinue"
                class="btn btn-primary btn-large"
                disabled>

                <span class="btn-tamil">

                    தொடரலாம்

                </span>

                <span class="btn-english">

                    Continue →

                </span>

            </button>

        </section>

        <!--==================================================
            Progress
        ==================================================-->

        <footer class="screen01-footer">

            <p class="help-text">

                Screen 1 of 16

            </p>

        </footer>

    </div>

</section>
