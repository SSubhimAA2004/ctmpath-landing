<section class="ctm-scene ctm-input">

    <div class="ctm-scene__container">

        <!-- ======================================================
             HEADER
        ======================================================= -->

        <header class="ctm-scene__header">

            <div class="ctm-scene__step">

                {{step}}

            </div>

            <h1 class="ctm-scene__title-ta">

                {{titleTa}}

            </h1>

            <h2 class="ctm-scene__title-en">

                {{titleEn}}

            </h2>

        </header>

        <!-- ======================================================
             QUESTION
        ======================================================= -->

        <main class="ctm-scene__content">

            <div class="ctm-input__question">

                <p class="ctm-question-ta">

                    {{questionTa}}

                </p>

                <p class="ctm-question-en">

                    {{questionEn}}

                </p>

            </div>

            <!-- ==================================================
                 INPUT FIELD
            =================================================== -->

            <div class="ctm-input__field">

                <label
                    class="ctm-input__label"
                    for="ctm-input">

                    <span class="ctm-label-ta">

                        {{labelTa}}

                    </span>

                    <span class="ctm-label-en">

                        {{labelEn}}

                    </span>

                </label>

                <input
                    id="ctm-input"
                    class="ctm-input__control"
                    type="{{type}}"
                    name="{{name}}"
                    value="{{value}}"
                    placeholder="{{placeholderTa}}"
                    autocomplete="{{autocomplete}}"
                    inputmode="{{inputmode}}"
                    maxlength="{{maxlength}}"
                    required>

            </div>

            <!-- ==================================================
                 HELPER
            =================================================== -->

            <div
                class="ctm-input__helper"
                aria-live="polite">

                <div class="ctm-helper-ta">

                    {{helperTa}}

                </div>

                <div class="ctm-helper-en">

                    {{helperEn}}

                </div>

            </div>

        </main>

        <!-- ======================================================
             CALL TO ACTION
        ======================================================= -->

        <footer class="ctm-scene__footer">

            <button
                type="button"
                class="ctm-button-green"
                data-action="continue"
                disabled>

                <span class="ctm-button-ta">

                    {{buttonTa}}

                </span>

                <span class="ctm-button-en">

                    {{buttonEn}}

                </span>

            </button>

        </footer>

    </div>

</section>
