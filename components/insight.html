<section class="ctm-scene ctm-insight">

    <div class="ctm-scene__container">

        <!-- Header -->

        <header class="ctm-scene__header">

            <div class="ctm-scene__step">

                {{step}}

            </div>

            <h1 class="ctm-scene__title">

                {{title}}

            </h1>

            <h2 class="ctm-scene__subtitle">

                {{subtitle}}

            </h2>

        </header>

        <!-- Insight -->

        <main class="ctm-scene__content">

            <section class="ctm-insight__card">

                <div class="ctm-insight__intro">

                    {{intro}}

                </div>

                <div class="ctm-insight__message">

                    {{insight}}

                </div>

                <div class="ctm-insight__summary">

                    {{summary}}

                </div>

            </section>

        </main>

        <!-- Continue -->

        <footer class="ctm-scene__footer">

            <button
                type="button"
                class="ctm-button ctm-button--primary"
                data-action="continue">

                {{button}}

            </button>

        </footer>

    </div>

</section>
