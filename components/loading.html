<section class="ctm-scene ctm-loading">

    <div class="ctm-scene__container">

        <!-- ======================================================
             HEADER
        ======================================================= -->

        <header class="ctm-scene__header">

            <h1 class="ctm-scene__title-ta">

                {{titleTa}}

            </h1>

            <h2 class="ctm-scene__title-en">

                {{titleEn}}

            </h2>

        </header>

        <!-- ======================================================
             LOADING ANIMATION
        ======================================================= -->

        <main class="ctm-scene__content">

            <div class="ctm-loading__animation">

                <div class="ctm-spinner"></div>

            </div>

            <div class="ctm-loading__message">

                <div class="ctm-ta">

                    {{messageTa}}

                </div>

                <div class="ctm-en">

                    {{messageEn}}

                </div>

            </div>

        </main>

    </div>

</section>
