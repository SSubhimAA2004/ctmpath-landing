
<!--
==========================================================
CTM PATH™ Guided Journey v3.0
File: components/complete.html

Responsibility:
Presentation template for journey completion.

Displayed after the visitor completes the
35-Moment Guided Journey.

No JavaScript.
No business logic.
Rendered by renderer.js
==========================================================
-->

<section class="ctm-scene ctm-complete">

    <div class="ctm-scene__container">

        <!-- Header -->

        <header class="ctm-scene__header">

            <div class="ctm-scene__step">

                {{step}}

            </div>

            <h1 class="ctm-scene__title">

                {{title}}

            </h1>

            <h2 class="ctm-scene__subtitle">

                {{subtitle}}

            </h2>

        </header>

        <!-- Completion Summary -->

        <main class="ctm-scene__content">

            <section class="ctm-complete__card">

                <div class="ctm-complete__message">

                    {{message}}

                </div>

                <div class="ctm-complete__summary">

                    {{summary}}

                </div>

                <div class="ctm-complete__next">

                    {{nextStep}}

                </div>

            </section>

        </main>

        <!-- Final Actions -->

        <footer class="ctm-scene__footer">

            <button
                type="button"
                class="ctm-button ctm-button--primary"
                data-action="finish">

                {{primaryButton}}

            </button>

            <button
                type="button"
                class="ctm-button ctm-button--secondary"
                data-action="restart">

                {{secondaryButton}}

            </button>

        </footer>

    </div>

</section>
