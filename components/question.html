
<!--
==========================================================
CTM PATH™ Guided Journey v3.3
File: components/question.html

Responsibility:
Presentation template for Question Moments.

Uses the standardized bilingual structure.

No JavaScript.
No business logic.
==========================================================
-->

<section class="ctm-scene ctm-question">

    <div class="ctm-scene__container">

        <!-- ======================================================
             HEADER
        ======================================================= -->

        <header class="ctm-scene__header">

            <div class="ctm-scene__step">

                {{step}}

            </div>

            <h1 class="ctm-scene__title-ta">

                {{titleTa}}

            </h1>

            <h2 class="ctm-scene__title-en">

                {{titleEn}}

            </h2>

        </header>

        <!-- ======================================================
             QUESTION
        ======================================================= -->

        <main class="ctm-scene__content">

            <div class="ctm-question__body">

                {{question}}

            </div>

        </main>

        <!-- ======================================================
             NAVIGATION
        ======================================================= -->

        <footer class="ctm-scene__footer">

            <button
                type="button"
                class="ctm-button-green"
                data-action="continue">

                {{button}}

            </button>

        </footer>

    </div>

</section>
