
<!--
==========================================================
CTM PATH™ Guided Journey v3.0
File: components/booking.html

Responsibility:
Presentation template for Discovery Session booking.

This is the final conversion component that
invites the visitor to schedule a complimentary
Discovery Session with Raphael Raj.

No JavaScript.
No business logic.
Rendered by renderer.js
==========================================================
-->

<section class="ctm-scene ctm-booking">

    <div class="ctm-scene__container">

        <!-- Header -->

        <header class="ctm-scene__header">

            <div class="ctm-scene__step">

                {{step}}

            </div>

            <h1 class="ctm-scene__title">

                {{title}}

            </h1>

            <h2 class="ctm-scene__subtitle">

                {{subtitle}}

            </h2>

        </header>

        <!-- Booking Content -->

        <main class="ctm-scene__content">

            <section class="ctm-booking__card">

                <div class="ctm-booking__intro">

                    {{intro}}

                </div>

                <div class="ctm-booking__description">

                    {{description}}

                </div>

                <ul class="ctm-booking__benefits">

                    {{benefits}}

                </ul>

                <div class="ctm-booking__note">

                    {{note}}

                </div>

            </section>

        </main>

        <!-- Call To Action -->

        <footer class="ctm-scene__footer">

            <button
                type="button"
                class="ctm-button ctm-button--primary"
                data-action="book-session">

                {{primaryButton}}

            </button>

            <button
                type="button"
                class="ctm-button ctm-button--secondary"
                data-action="continue">

                {{secondaryButton}}

            </button>

        </footer>

    </div>

</section>
