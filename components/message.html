
<!--

Welcome Component (FROZEN)
==========================================================

<section class="ctm-welcome">

    <div class="ctm-welcome__container">

        <!-- ======================================================
             BRAND
        ======================================================= -->

        <header class="ctm-welcome__header">

            <img
                src="images/CTM_Logo.png"
                alt="CTM PATH™"
                class="ctm-logo">

        </header>

        <!-- ======================================================
             WELCOME TITLE
        ======================================================= -->

        <section class="ctm-welcome__hero">

            <h1 class="ctm-title-ta">

                {{titleTa}}

            </h1>

            <h2 class="ctm-title-en">

                {{titleEn}}

            </h2>

        </section>

        <!-- ======================================================
             DIVIDER
        ======================================================= -->

        <section class="ctm-divider">

            <span class="ctm-divider-line"></span>

            <span class="ctm-divider-lotus">

                ✦

            </span>

            <span class="ctm-divider-line"></span>

        </section>

        <!-- ======================================================
             NAMASTE
        ======================================================= -->

        <section class="ctm-namaste">

            <img
                src="images/namaste.svg"
                alt="Namaste"
                class="ctm-namaste-icon">

        </section>

        <!-- ======================================================
             MESSAGE
        ======================================================= -->

        <main class="ctm-message">

            {{message}}

        </main>

        <!-- ======================================================
             CALL TO ACTION
        ======================================================= -->

        <footer class="ctm-footer">

            <button
                type="button"
                class="ctm-button-green"
                data-action="continue">

                <span class="ctm-button-ta">

                    தொடரலாம்

                </span>

                <span class="ctm-button-en">

                    Let's Continue

                </span>

            </button>

        </footer>

    </div>

</section>
