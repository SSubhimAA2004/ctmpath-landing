Welcome Component

<section class="ctm-welcome">

    <div class="ctm-welcome__container">

        <!-- Brand -->

        <header class="ctm-welcome__header">

            <img
                src="images/CTM_Logo.png"
                alt="CTM PATH"
                class="ctm-logo">

        </header>

        <!-- Welcome -->

        <section class="ctm-welcome__hero">

            <h1 class="ctm-title-ta">
                {{title}}
            </h1>

            <h2 class="ctm-title-en">
                {{subtitle}}
            </h2>

        </section>

        <!-- Divider -->

        <section class="ctm-divider">

            <div class="ctm-divider-line"></div>

            <div class="ctm-divider-lotus">

                🪷

            </div>

            <div class="ctm-divider-line"></div>

        </section>

        <!-- Namaste -->

        <section class="ctm-namaste">

            <img
                src="images/namaste.svg"
                alt="Welcome"
                class="ctm-namaste-icon">

        </section>

        <!-- Greeting -->

        <section class="ctm-message">

            {{message}}

        </section>

        <!-- CTA -->

        <footer class="ctm-footer">

            <button
                class="ctm-button ctm-button-green"
                data-action="continue">

                {{button}}

            </button>

        </footer>

    </div>

</section>
