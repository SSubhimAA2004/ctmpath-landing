<section class="ctm-scene ctm-choice">

    <div class="ctm-scene__container">

        <!-- ======================================================
             HEADER
        ======================================================= -->

        <header class="ctm-scene__header">

            <div class="ctm-scene__step">

                {{step}}

            </div>

            <h1 class="ctm-scene__title-ta">

                {{titleTa}}

            </h1>

            <h2 class="ctm-scene__title-en">

                {{titleEn}}

            </h2>

        </header>

        <!-- ======================================================
             QUESTION
        ======================================================= -->

        <main class="ctm-scene__content">

            <div class="ctm-question__body">

                <p class="ctm-question-ta">

                    {{questionTa}}

                </p>

                <p class="ctm-question-en">

                    {{questionEn}}

                </p>

            </div>

            <!-- ==================================================
                 CHOICES
            =================================================== -->

            <div
                class="ctm-choice__list"
                id="ctm-choice-list">

                {{choices}}

            </div>

            <!-- ==================================================
                 HELPER
            =================================================== -->

            <div
                class="ctm-choice__helper"
                aria-live="polite">

                <div class="ctm-helper-ta">

                    {{helperTa}}

                </div>

                <div class="ctm-helper-en">

                    {{helperEn}}

                </div>

            </div>

        </main>

        <!-- ======================================================
             CALL TO ACTION
        ======================================================= -->

        <footer class="ctm-scene__footer">

            <button
                type="button"
                class="ctm-button-green"
                data-action="continue"
                disabled>

                <span class="ctm-button-ta">

                    {{buttonTa}}

                </span>

                <span class="ctm-button-en">

                    {{buttonEn}}

                </span>

            </button>

        </footer>

    </div>

</section>
