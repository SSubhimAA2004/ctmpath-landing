<section class="ctm-scene ctm-choice">

    <div class="ctm-scene__container">

        <!-- Header -->

        <header class="ctm-scene__header">

            <div class="ctm-scene__step">
                {{step}}
            </div>

            <h1 class="ctm-scene__title">
                {{title}}
            </h1>

            <h2 class="ctm-scene__subtitle">
                {{subtitle}}
            </h2>

        </header>

        <!-- Prompt -->

        <main class="ctm-scene__content">

            <div class="ctm-choice__question">

                {{question}}

            </div>

            <div
                class="ctm-choice__options"
                role="radiogroup"
                aria-label="{{title}}">

                {{choices}}

            </div>

        </main>

        <!-- Navigation -->

        <footer class="ctm-scene__footer">

            <button
                type="button"
                class="ctm-button ctm-button--primary"
                data-action="continue"
                disabled>

                {{button}}

            </button>

        </footer>

    </div>

</section>
